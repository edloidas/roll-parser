name: Release

on:
  push:
    tags: ['v*']

concurrency:
  group: release
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write

jobs:
  precheck:
    name: Verify tag is on master
    runs-on: ubuntu-latest
    outputs:
      allowed: ${{ steps.contains.outputs.allowed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if tag commit is on master or a version branch
        id: contains
        shell: bash
        run: |
          git fetch --quiet origin '+refs/heads/*:refs/remotes/origin/*' || true
          contains="$(git branch -r --contains "${GITHUB_SHA}" | sed 's/^[ *]*//')"
          echo "Branches containing the tag commit:"
          echo "${contains}"
          if echo "${contains}" | grep -Eq '^origin/(master|[0-9]+\.[0-9]+)$'; then
            echo "allowed=true" >> "$GITHUB_OUTPUT"
          else
            echo "allowed=false" >> "$GITHUB_OUTPUT"
          fi

  publish:
    name: Publish to npm
    needs: precheck
    if: needs.precheck.outputs.allowed == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.10'

      - name: Setup Node.js (for npm CLI + OIDC .npmrc wiring)
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify tag matches package.json version
        run: bun run check:version "${GITHUB_REF_NAME}"

      - name: Verify CHANGELOG has entry for this version
        run: bun run check:changelog "${GITHUB_REF_NAME#v}"

      - name: Determine dist-tag
        id: disttag
        shell: bash
        run: |
          V="${GITHUB_REF_NAME#v}"
          case "$V" in
            *-alpha*) TAG=alpha ;;
            *-beta*)  TAG=beta ;;
            *-rc*)    TAG=rc ;;
            *-*)      TAG=next ;;
            *)        TAG=latest ;;
          esac
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          if [ "$TAG" = "latest" ]; then
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi
          echo "Dist-tag: $TAG"

      - name: Build & validate
        run: bun run release:dry

      - name: Publish to npm
        # Uses npm CLI (not bun) because Bun does not yet support OIDC
        # Trusted Publishing (oven-sh/bun#15601). Provenance attestations are
        # generated automatically by npm under Trusted Publishing — no flag needed.
        run: npm publish --tag "${{ steps.disttag.outputs.tag }}"

      - name: Extract CHANGELOG section for release body
        shell: bash
        run: |
          V="${GITHUB_REF_NAME#v}"
          awk -v prefix="## [$V]" '
            substr($0, 1, length(prefix)) == prefix { found=1; next }
            found && /^## \[/ { exit }
            found && /^\[[^]]+\]: / { exit }
            found { lines[++n] = $0 }
            END {
              start = 1
              while (start <= n && lines[start] ~ /^[[:space:]]*$/) start++
              end = n
              while (end >= start && lines[end] ~ /^[[:space:]]*$/) end--
              for (i = start; i <= end; i++) print lines[i]
            }
          ' CHANGELOG.md > release-body.md
          if [ ! -s release-body.md ]; then
            echo "::error::Empty CHANGELOG section for $V — aborting"
            exit 1
          fi
          echo "::group::Release body"
          cat release-body.md
          echo "::endgroup::"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          prerelease: ${{ steps.disttag.outputs.prerelease == 'true' }}
          body_path: release-body.md
