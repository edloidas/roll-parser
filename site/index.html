<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>roll-parser — interactive dice notation playground</title>
    <meta
      name="description"
      content="Interactive playground for roll-parser: type dice notation and watch it roll. Shareable, seeded, reproducible."
    />
    <link rel="icon" type="image/svg+xml" href="./public/favicon.svg" />
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      href="./public/fonts/cinzel-latin.woff2"
      crossorigin
    />
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      href="./public/fonts/alegreya-latin.woff2"
      crossorigin
    />
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <!-- Shared SVG gradients — referenced by id from die/logo SVGs.
         #rp-rainbow: logo only. #rp-gold: tray dice stroke. -->
    <svg class="defs" aria-hidden="true" width="0" height="0" focusable="false">
      <defs>
        <linearGradient id="rp-rainbow" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#ff4d6d" />
          <stop offset="20%" stop-color="#ff9e3d" />
          <stop offset="40%" stop-color="#ffe14d" />
          <stop offset="60%" stop-color="#4dff9e" />
          <stop offset="80%" stop-color="#4dc4ff" />
          <stop offset="100%" stop-color="#b06dff" />
        </linearGradient>
        <linearGradient id="rp-gold" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#d9a441" />
          <stop offset="100%" stop-color="#a3622f" />
        </linearGradient>
      </defs>
    </svg>

    <nav class="top-nav" aria-label="Site">
      <a class="guide-link" href="./reference.html" aria-label="Notation guide">
        <span class="guide-glyph" aria-hidden="true">⤳</span>
        <span class="guide-text">Guide</span>
      </a>
      <a class="guide-link" href="./docs/" aria-label="API reference">
        <span class="guide-glyph" aria-hidden="true">{}</span>
        <span class="guide-text">Docs</span>
      </a>
    </nav>

    <div class="app" id="app">
      <main class="main">
        <a class="logo" href="https://github.com/edloidas/roll-parser" aria-label="roll-parser on GitHub">
          <svg class="logo-die" viewBox="0 0 100 100" aria-hidden="true">
            <!-- d20: pointy-top hexagon outline with central triangle facets -->
            <polygon
              class="logo-stroke"
              points="50,4 89.8,27 89.8,73 50,96 10.2,73 10.2,27"
            />
            <polygon class="logo-stroke" points="50,26 72,64 28,64" />
            <path
              class="logo-stroke"
              d="M50,4 L50,26 M89.8,27 L72,64 M89.8,73 L72,64 M50,96 L50,64 M10.2,73 L28,64 M10.2,27 L28,64 M28,64 L50,64 M72,64 L50,64"
            />
            <text class="logo-num" x="50" y="20" text-anchor="middle">20</text>
          </svg>
          <span class="wordmark">roll-parser</span>
        </a>

        <div class="tray" id="tray" aria-hidden="true"></div>

        <div class="input-zone">
          <div class="input-row">
            <label class="visually-hidden" for="notation">Dice notation</label>
            <input
              id="notation"
              class="notation-input"
              type="text"
              inputmode="text"
              autocomplete="off"
              autocapitalize="off"
              autocorrect="off"
              spellcheck="false"
              enterkeyhint="go"
              placeholder="Try 4d6kh3, 1d20+7 vs 15, 8d6!…"
            />
            <button id="reroll" class="icon-btn" type="button" title="Reroll (Enter)" aria-label="Reroll">
              <span class="icon-glyph" aria-hidden="true">⟳</span>
            </button>
            <button id="copy" class="icon-btn" type="button" title="Copy shareable link" aria-label="Copy link">
              <!-- Inline SVG instead of the 🔗 emoji — emoji glyphs ignore CSS color. -->
              <svg class="icon-glyph icon-link" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M10 14a5 5 0 0 0 7.07 0l3.18-3.18a5 5 0 0 0-7.07-7.07L11.5 5.4" />
                <path d="M14 10a5 5 0 0 0-7.07 0l-3.18 3.18a5 5 0 0 0 7.07 7.07l1.67-1.66" />
              </svg>
              <span class="copied-flag" id="copied" aria-hidden="true">copied</span>
            </button>
          </div>

          <div class="error-slot" id="error" role="alert" aria-live="assertive"></div>

          <div class="examples" id="examples">
            <div class="example-group">
              <span class="example-label">D&amp;D 5e</span>
              <div class="example-chips">
                <button class="chip" type="button" data-notation="4d6kh3">4d6kh3</button>
                <button class="chip" type="button" data-notation="2d20kh1+5">2d20kh1+5</button>
                <button class="chip" type="button" data-notation="8d6">8d6</button>
              </div>
            </div>
            <div class="example-group">
              <span class="example-label">World of Darkness</span>
              <div class="example-chips">
                <button class="chip" type="button" data-notation="8d10&gt;=6f1">8d10&gt;=6f1</button>
                <button class="chip" type="button" data-notation="6d10!=10&gt;=8">6d10!=10&gt;=8</button>
              </div>
            </div>
            <div class="example-group">
              <span class="example-label">Shadowrun</span>
              <div class="example-chips">
                <button class="chip" type="button" data-notation="12d6&gt;=5">12d6&gt;=5</button>
              </div>
            </div>
            <div class="example-group">
              <span class="example-label">Fate</span>
              <div class="example-chips">
                <button class="chip" type="button" data-notation="4dF+2">4dF+2</button>
              </div>
            </div>
            <div class="example-group">
              <span class="example-label">Pathfinder 2e</span>
              <div class="example-chips">
                <button class="chip" type="button" data-notation="1d20+7 vs 15">1d20+7 vs 15</button>
              </div>
            </div>
            <div class="example-group">
              <span class="example-label">Savage Worlds</span>
              <div class="example-chips">
                <button class="chip" type="button" data-notation="{1d8!, 1d6!}kh1">{1d8!, 1d6!}kh1</button>
              </div>
            </div>
            <div class="example-group">
              <span class="example-label">Call of Cthulhu</span>
              <div class="example-chips">
                <button class="chip" type="button" data-notation="d%">d%</button>
              </div>
            </div>
          </div>
        </div>

        <section class="result-panel" id="result" aria-live="polite" aria-label="Roll result"></section>
      </main>

      <footer class="footer">
        <a href="./reference.html">Guide</a>
        <span class="dot">·</span>
        <a href="./docs/">Docs</a>
        <span class="dot">·</span>
        <a href="https://github.com/edloidas/roll-parser">GitHub</a>
        <span class="dot">·</span>
        <a href="https://www.npmjs.com/package/roll-parser">npm</a>
        <span class="dot">·</span>
        <span class="version" id="version"></span>
      </footer>
    </div>

    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
